  <!--HOME-->
  <section id="HOME">
        <div class="card-body row3">
          <h1 class="card-title city">Udupi</h1>
          <h6><p class="card-text p1 day">Thursday,May 1</p></h6>
          <h6><p class="card-text p2 time">Updates As Of 2:45 PM</p> </h6>
        </div>
    <div class="row row1">
      <div class="col-sm-2">
        <div class="card">
          <div class="card-body bodycard">
            <h5 class="card-title ">Real Feel</h5>
            <p class="card-text feels_like" style="font-size: large;">30&deg;</p>
          </div>
        </div>
      </div>
      <div class="col-sm-2">
        <div class="card">
          <div class="card-body bodycard">
            <h5 class="card-title">Wind</h5>
            <p class="card-text wind">0.2 km/h</p>           
          </div>
        </div>
      </div>
    </div>
    <div class="row row2 ">
      <div class="col-sm-2">
        <div class="card">
          <div class="card-body bodycard">
            <h5 class="card-title">Humidity</h5>
             <p class="card-text humidity">74</p>           
          </div>
        </div>
      </div>
      <div class="col-sm-2">
        <div class="card">
          <div class="card-body bodycard">
            <h5 class="card-title">clouds</h5>
            <p class="card-text description">30 %</p>             
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- CARD-->
  <section id="CARD">
    <img src="./Images/Sunny_cloud.png" alt="Cloud icon" class="cloud-icon" id="cloud-icon">
    <div class="card homecard" style="width: 18rem;">
      <div class="card-body">
        <button class="tempcard">Today</button>
        <h5 class="card-title temp1 temp">23&deg;<sup>C</sup></h5>
        <p class="card-text temp2 temp">23&deg;<sup>C</sup></p>
        <p class="temp4">-</p>
        <p class="card-text temp3 feels_like">24&deg;<sup>C</sup></p>
      </div>
    </div>
  </section>
<div class="weatherimg">
  <img id="weather-image" src="./Images/Inital.jpg" alt="Weather Image">
</div>
